services:
  - type: web
    name: eastafrica-agrohub
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn agrohub.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: agrohub-db
          property: connectionString

databases:
  - name: agrohub-db
    databaseName: agrohub
    user: agrohub
